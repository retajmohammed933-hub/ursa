<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark login-page" data-page="login">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar"><div class="close-btn" id="closeSidebar">&times;</div></aside>
  <div class="top-bar">
    <div class="logo-area">
      <div class="hamburger" id="openSidebar"><i class="fas fa-bars"></i></div>
      <div class="logo-container">
        <div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div>
        <div class="logo">URSA</div>
      </div>
    </div>
    <div class="theme-toggle"><i class="fas fa-sun" id="lightModeBtn"></i><i class="fas fa-moon active" id="darkModeBtn"></i></div>
  </div>
  <div class="container">
    <div class="glass-card auth-card">
      <h1 style="text-align:center; margin-bottom:20px;">Welcome back</h1>
      <p style="text-align:center; color: var(--text-secondary); margin-bottom:25px;">Login to your URSA account</p>
      <div class="error-message" id="loginError"></div>
      <form id="loginForm">
        <label>Phone or National ID <span class="required-star">*</span></label>
        <input class="glass-input" type="text" id="loginIdentifier" required />
        <label>Password <span class="required-star">*</span></label>
        <input class="glass-input" type="password" id="loginPassword" required />
        <button type="submit" class="glass-btn primary" style="width:100%; margin-bottom:12px;">Login</button>
      </form>
      <button class="glass-btn" id="goToRegister" type="button" style="width:100%;">Create account</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
