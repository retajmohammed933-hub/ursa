<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URSA · Choose Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #05201f, #0a2a28);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .portal-container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 50px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2d8f77, #4dbfa3);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            box-shadow: 0 0 30px rgba(77, 255, 158, 0.3);
        }

        .logo h1 {
            font-size: 2.5rem;
            color: white;
            letter-spacing: -0.02em;
        }

        .logo p {
            color: #b4d9d4;
            margin-top: 8px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .card {
            background: rgba(8, 38, 36, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(77, 255, 158, 0.25);
            border-radius: 28px;
            padding: 40px 30px;
            width: 320px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #4dbfa3;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .admin-card .card-icon {
            color: #ffaa44;
        }

        .reporter-card .card-icon {
            color: #4dbfa3;
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: white;
        }

        .card p {
            color: #b4d9d4;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .card-btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .admin-card .card-btn {
            background: rgba(255, 170, 68, 0.2);
            border: 1px solid #ffaa44;
            color: #ffaa44;
        }

        .reporter-card .card-btn {
            background: rgba(77, 191, 163, 0.2);
            border: 1px solid #4dbfa3;
            color: #4dbfa3;
        }

        .card:hover .card-btn {
            transform: translateY(-2px);
        }

        .admin-card .card-btn:hover {
            background: #ffaa44;
            color: #05201f;
        }

        .reporter-card .card-btn:hover {
            background: #4dbfa3;
            color: #05201f;
        }

        footer {
            margin-top: 60px;
            color: #6a8f89;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .cards {
                gap: 20px;
            }
            .card {
                width: 280px;
                padding: 30px 20px;
            }
            .logo h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <div class="logo">
            <h1>URSA</h1>
            <p>Unified Reporting & Safety Application</p>
        </div>

        <div class="cards">
            <!-- Admin Card -->
            <div class="card admin-card" id="adminCard">
                <div class="card-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2>Admin</h2>
                <p>Access the admin dashboard to manage all reports, users, and system settings.</p>
                <span class="card-btn">Enter Admin Panel <i class="fas fa-arrow-right"></i></span>
            </div>

            <!-- Reporter Card -->
            <div class="card reporter-card" id="reporterCard">
                <div class="card-icon">
                    <i class="fas fa-user-check"></i>
                </div>
                <h2>Reporter</h2>
                <p>Submit safety reports, track your complaints, and access emergency services.</p>
                <span class="card-btn">Enter Reporter Portal <i class="fas fa-arrow-right"></i></span>
            </div>
        </div>

        <footer>
            <p>© 2024 URSA · City Safety Platform</p>
        </footer>
    </div>

    <script>
        // Simple navigation
        document.getElementById('adminCard').addEventListener('click', function() {
            window.location.href = 'admin.html';
        });

        document.getElementById('reporterCard').addEventListener('click', function() {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
