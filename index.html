<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URSA · Unified Reporting & Safety</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 10% 30%, #ffffff, #e8f0f5);
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-sidebar: rgba(255, 255, 255, 0.7);
            --text-primary: #1c2a2a;
            --text-secondary: #1e4f4f;
            --primary: #2fa4a4;
            --secondary: #4fd1c5;
            --accent: #66e0d9;
            --danger: #ff6b6b;
            --success: #2ba36a;
            --soft-shadow: 0 20px 40px -10px rgba(47, 164, 164, 0.2), 0 8px 24px rgba(0, 40, 40, 0.1);
            --glass-edge: 1px solid rgba(47, 164, 164, 0.25);
            --logo-glow: 0 10px 20px rgba(47, 164, 164, 0.4);
            --bg-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBkPSJNMjAgMkwyIDIwbDE4IDE4IDE4LTE4TDIwIDJ6IiBmaWxsPSIjMmZhNGE0IiBmaWxsLW9wYWNpdHk9IjAuMDYiLz48cGF0aCBkPSJNMjAgMTBsMTAgMTAtMTAgMTBMMTAgMjB6IiBmaWxsPSIjNGZkMWM1IiBmaWxsLW9wYWNpdHk9IjAuMDQiLz48L3N2Zz4=');
        }

        body.dark {
            --bg-gradient: radial-gradient(circle at 80% 20%, #0f2f2f, #0a2323);
            --bg-card: rgba(22, 61, 61, 0.7);
            --bg-sidebar: rgba(15, 47, 47, 0.8);
            --text-primary: #eaf6f6;
            --text-secondary: #b4dddd;
            --soft-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(102, 224, 217, 0.15);
            --glass-edge: 1px solid rgba(77, 200, 200, 0.3);
            --logo-glow: 0 0 30px #4fd1c5;
            --bg-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBkPSJNMjAgMkwyIDIwbDE4IDE4IDE4LTE4TDIwIDJ6IiBmaWxsPSIjNGZkMWM1IiBmaWxsLW9wYWNpdHk9IjAuMTUiLz48cGF0aCBkPSJNMjAgMTBsMTAgMTAtMTAgMTBMMTAgMjB6IiBmaWxsPSIjNjZlMGQ5IiBmaWxsLW9wYWNpdHk9IjAuMSIvPjwvc3ZnPg==');
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
            position: relative;
            font-weight: 400;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: var(--bg-image);
            background-repeat: repeat;
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: var(--soft-shadow);
            border: var(--glass-edge);
            padding: 32px 30px;
        }

        .glass-btn {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border: var(--glass-edge);
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            color: var(--text-primary);
            box-shadow: 0 15px 30px -10px rgba(0, 80, 80, 0.3);
            cursor: pointer;
            transition: 0.2s;
        }

        .glass-btn:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow: 0 20px 35px -8px var(--primary);
        }

        .glass-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
        }

        .glass-btn.small {
            padding: 12px 18px;
            font-size: 0.95rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 28px 50px;
        }

        /* Header Styles */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 32px;
            gap: 16px;
        }

        .logo-container,
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-image {
            width: 78px;
            height: 78px;
            min-width: 78px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--logo-glow);
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 2px solid rgba(255, 255, 255, 0.35);
        }

        .logo-image img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #eaf6f6, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: var(--logo-glow);
        }

        .hamburger {
            background: var(--bg-card);
            width: 62px;
            height: 62px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
            box-shadow: var(--soft-shadow);
            cursor: pointer;
            border: var(--glass-edge);
        }

        .theme-toggle {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            gap: 14px;
            box-shadow: var(--soft-shadow);
        }

        .theme-toggle i {
            font-size: 1.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .theme-toggle i.active {
            background: var(--primary);
            color: white;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -340px;
            top: 0;
            bottom: 0;
            width: 300px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(24px);
            border-right: 2px solid var(--primary);
            box-shadow: var(--soft-shadow);
            padding: 40px 20px;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 1000;
            border-radius: 0 60px 60px 0;
        }

        .sidebar.open {
            left: 0;
        }

        .close-btn {
            text-align: right;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 40px;
            cursor: pointer;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 24px;
        }

        .sidebar ul li a {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 24px;
            border-radius: 60px;
            background: rgba(47, 164, 164, 0.1);
            border: var(--glass-edge);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1.1rem;
        }

        .sidebar ul li a i {
            color: var(--primary);
            width: 28px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            z-index: 900;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* Navigation Bar */
        .nav-bar {
            display: flex;
            gap: 10px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 60px;
            margin-bottom: 30px;
            border: var(--glass-edge);
        }

        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            color: var(--text-primary);
            transition: all 0.3s;
            flex: 1;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Pages */
        .page {
            display: none;
            animation: fade 0.2s;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0.2;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .glass-input,
        .glass-select,
        .glass-textarea {
            width: 100%;
            padding: 18px 24px;
            background: var(--bg-card);
            border: var(--glass-edge);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .glass-input:focus,
        .glass-select:focus,
        .glass-textarea:focus {
            outline: 2px solid var(--accent);
        }

        .glass-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .required-star {
            color: var(--primary);
            margin-left: 4px;
        }

        /* Report Cards */
        .report-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 20px;
            border-left: 4px solid var(--primary);
            box-shadow: var(--soft-shadow);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            background: #ffa500;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Success Message */
        .success-message {
            background: var(--success);
            color: white;
            padding: 15px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: var(--glass-edge);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        @media (max-width: 650px) {
            .top-bar {
                padding: 18px;
            }

            .container {
                padding: 0 16px 40px;
            }

            .logo {
                font-size: 1.8rem;
            }

            .logo-image {
                width: 64px;
                height: 64px;
                min-width: 64px;
            }
        }
    </style>
</head>
<body class="dark">
    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="close-btn" id="closeSidebar">&times;</div>
        <ul>
            <li><a href="#" data-page="home"><i class="fas fa-house"></i> Home</a></li>
            <li><a href="#" data-page="report"><i class="fas fa-camera"></i> Report</a></li>
            <li><a href="#" data-page="myreports"><i class="fas fa-clipboard-list"></i> My Reports</a></li>
            <li><a href="#" data-page="map"><i class="fas fa-map-location-dot"></i> Map</a></li>
            <li><a href="#" data-page="emergency"><i class="fas fa-triangle-exclamation"></i> Emergency</a></li>
            <li><a href="#" data-page="settings"><i class="fas fa-gear"></i> Settings</a></li>
        </ul>
    </aside>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo-area">
            <div class="hamburger" id="openSidebar"><i class="fas fa-bars"></i></div>

            <div class="logo-container">
                <div class="logo-image">
                    <img src="URSA 3.png" alt="URSA Logo" />
                </div>
                <div class="logo">URSA</div>
            </div>
        </div>

        <div class="theme-toggle">
            <i class="fas fa-sun" id="lightModeBtn"></i>
            <i class="fas fa-moon active" id="darkModeBtn"></i>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <button class="nav-btn active" onclick="showPage('report')">📸 Report</button>
            <button class="nav-btn" onclick="showPage('myreports')">📋 My Reports</button>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message">
            ✅ Complaint saved successfully!
        </div>

        <!-- Report Page -->
        <div id="page-report" class="page active-page">
            <div class="glass-card">
                <h2 style="color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-pen"></i> Submit New Complaint
                </h2>
                
                <form id="reportForm">
                    <div class="form-group">
                        <label>Description <span class="required-star">*</span></label>
                        <textarea class="glass-textarea" id="description" placeholder="Describe your complaint in detail..." rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Category <span class="required-star">*</span></label>
                        <select class="glass-select" id="category" required>
                            <option value="">-- Select Category --</option>
                            <option value="Accident">🚗 Accident</option>
                            <option value="Theft">💰 Theft</option>
                            <option value="Road Damage">🛣️ Road Damage</option>
                            <option value="Broken Light">💡 Broken Light</option>
                            <option value="Noise">🔊 Noise Complaint</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input class="glass-input" type="text" id="location" value="Benha">
                    </div>

                    <button type="submit" class="glass-btn primary" style="width: 100%;">
                        <i class="fas fa-paper-plane"></i> Submit Complaint
                    </button>
                </form>
            </div>
        </div>

        <!-- My Reports Page -->
        <div id="page-myreports" class="page">
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                    <h2 style="color: var(--primary); display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-clipboard-list"></i> My Complaints
                    </h2>
                    <div class="action-bar">
                        <button class="glass-btn small" onclick="newReport()" style="background: var(--success); color: white;">
                            <i class="fas fa-plus"></i> New Report
                        </button>
                        <button class="glass-btn small" onclick="refreshReports()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div>Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="pendingCount">0</div>
                        <div>Pending</div>
                    </div>
                </div>

                <!-- Reports Container -->
                <div id="reportsContainer">
                    <p style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        <i class="fas fa-inbox" style="font-size: 3rem; opacity: 0.5;"></i>
                        <br>No complaints yet
                    </p>
                </div>
            </div>
        </div>

        <!-- Hidden Pages (for sidebar navigation) -->
        <div id="page-home" class="page">Home Page Content</div>
        <div id="page-map" class="page">Map Page Content</div>
        <div id="page-emergency" class="page">Emergency Page Content</div>
        <div id="page-settings" class="page">Settings Page Content</div>
    </div>

    <!-- JavaScript -->
    <script>
        // ==================== CONFIGURATION ====================
        const STORAGE_KEY = 'ursa_complaints';

        // ==================== SIDEBAR FUNCTIONS ====================
        document.getElementById('openSidebar').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        });

        document.getElementById('closeSidebar').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        });

        document.getElementById('overlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        });

        // Sidebar navigation
        document.querySelectorAll('.sidebar a[data-page]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const page = this.getAttribute('data-page');
                showPage(page);
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('show');
            });
        });

        // ==================== PAGE NAVIGATION ====================
        function showPage(pageName) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active-page');
            });
            
            // Show selected page
            const page = document.getElementById('page-' + pageName);
            if (page) {
                page.classList.add('active-page');
            }
            
            // Update navigation buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes('Report') && pageName === 'report') {
                    btn.classList.add('active');
                } else if (btn.textContent.includes('My Reports') && pageName === 'myreports') {
                    btn.classList.add('active');
                }
            });

            // If showing My Reports, load complaints
            if (pageName === 'myreports') {
                loadAndDisplayReports();
            }
        }

        // ==================== NEW REPORT BUTTON ====================
        function newReport() {
            // Clear the form
            document.getElementById('description').value = '';
            document.getElementById('category').value = '';
            document.getElementById('location').value = 'Benha';
            
            // Go to Report page
            showPage('report');
        }

        // ==================== REFRESH BUTTON ====================
        function refreshReports() {
            // Reload and display complaints
            loadAndDisplayReports();
            
            // Show feedback
            const message = document.getElementById('successMessage');
            message.textContent = '🔄 Reports refreshed!';
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 2000);
        }

        // ==================== LOAD AND DISPLAY REPORTS ====================
        function loadAndDisplayReports() {
            const container = document.getElementById('reportsContainer');
            
            // Get complaints from localStorage
            let complaints = [];
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    complaints = JSON.parse(saved);
                }
            } catch (e) {
                console.log('Error loading complaints');
            }

            // Update stats
            document.getElementById('totalCount').textContent = complaints.length;
            document.getElementById('pendingCount').textContent = complaints.filter(c => c.status === 'Pending').length;

            // Display complaints
            if (complaints.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        <i class="fas fa-inbox" style="font-size: 3rem; opacity: 0.5;"></i>
                        <br>No complaints yet
                    </p>
                `;
                return;
            }

            let html = '';
            complaints.reverse().forEach(complaint => {
                html += `
                    <div class="report-card">
                        <p style="font-size: 1.1rem; margin-bottom: 10px;">
                            <strong>📝 ${complaint.description}</strong>
                        </p>
                        <p style="margin: 8px 0;">
                            <i class="fas fa-tag" style="color: var(--primary);"></i> ${complaint.category}
                        </p>
                        <p style="margin: 8px 0;">
                            <i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> ${complaint.location}
                        </p>
                        <p style="margin: 8px 0; color: var(--text-secondary); font-size: 0.9rem;">
                            <i class="far fa-clock"></i> ${complaint.date}
                        </p>
                        <span class="badge">
                            <i class="fas fa-hourglass-half"></i> ${complaint.status || 'Pending'}
                        </span>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // ==================== SUBMIT BUTTON ====================
        document.getElementById('reportForm').addEventListener('submit', function(event) {
            // Stop the form from submitting normally
            event.preventDefault();
            
            console.log('Submit button clicked!');

            // Get form values
            const description = document.getElementById('description').value.trim();
            const category = document.getElementById('category').value;
            const location = document.getElementById('location').value.trim() || 'Benha';

            // Validate
            if (!description) {
                alert('Please enter a description');
                return;
            }
            if (!category) {
                alert('Please select a category');
                return;
            }

            // Create complaint object
            const newComplaint = {
                id: Date.now(),
                description: description,
                category: category,
                location: location,
                status: 'Pending',
                date: new Date().toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            // Save to localStorage
            let complaints = [];
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    complaints = JSON.parse(saved);
                }
            } catch (e) {
                complaints = [];
            }

            complaints.push(newComplaint);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(complaints));

            // Show success message
            const message = document.getElementById('successMessage');
            message.textContent = '✅ Complaint saved successfully!';
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);

            // Clear the form
            document.getElementById('description').value = '';
            document.getElementById('category').value = '';
            document.getElementById('location').value = 'Benha';

            // Go to My Reports page
            showPage('myreports');
        });

        // ==================== THEME TOGGLE ====================
        document.getElementById('lightModeBtn').addEventListener('click', function() {
            document.body.classList.remove('dark');
            document.getElementById('lightModeBtn').classList.add('active');
            document.getElementById('darkModeBtn').classList.remove('active');
            localStorage.setItem('ursa_theme', 'light');
        });

        document.getElementById('darkModeBtn').addEventListener('click', function() {
            document.body.classList.add('dark');
            document.getElementById('darkModeBtn').classList.add('active');
            document.getElementById('lightModeBtn').classList.remove('active');
            localStorage.setItem('ursa_theme', 'dark');
        });

        // ==================== INITIAL LOAD ====================
        window.onload = function() {
            console.log('URSA System ready - All buttons working');
            
            // Load saved theme
            const savedTheme = localStorage.getItem('ursa_theme') || 'dark';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('darkModeBtn').classList.add('active');
                document.getElementById('lightModeBtn').classList.remove('active');
            } else {
                document.body.classList.remove('dark');
                document.getElementById('lightModeBtn').classList.add('active');
                document.getElementById('darkModeBtn').classList.remove('active');
            }
            
            showPage('report');
        };
    </script>
</body>
</html>
