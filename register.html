<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA - Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark login-page" data-page="register">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar"><div class="close-btn" id="closeSidebar">&times;</div></aside>
  <div class="top-bar">
    <div class="logo-container"><div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div><div class="logo">URSA</div></div>
    <div class="theme-toggle"><i class="fas fa-sun" id="lightModeBtn"></i><i class="fas fa-moon active" id="darkModeBtn"></i></div>
  </div>
  <div class="container">
    <div class="glass-card auth-card">
      <h1 style="text-align:center; margin-bottom:20px;">Create account</h1>
      <div class="error-message" id="registerError"></div>
      <div class="success-message" id="registerSuccess"></div>
      <form id="registerForm">
        <label>Full name <span class="required-star">*</span></label>
        <input class="glass-input" type="text" id="regFullName" required />
        <label>National ID <span class="required-star">*</span></label>
        <input class="glass-input" type="text" id="regNationalId" maxlength="14" required />
        <label>Governorate <span class="required-star">*</span></label>
        <select class="glass-select" id="regGovernorate" required>
          <option value="">-- Select Governorate --</option>
          <option value="Cairo">Cairo</option>
          <option value="Giza">Giza</option>
          <option value="Alexandria">Alexandria</option>
          <option value="Dakahlia">Dakahlia</option>
        </select>
        <label>Phone number <span class="required-star">*</span></label>
        <input class="glass-input" type="tel" id="regPhone" maxlength="11" required />
        <label>Password <span class="required-star">*</span></label>
        <input class="glass-input" type="password" id="regPassword" required />
        <label>Confirm password <span class="required-star">*</span></label>
        <input class="glass-input" type="password" id="regConfirmPassword" required />
        <button type="submit" class="glass-btn primary" style="width:100%; margin-bottom:12px;">Register</button>
      </form>
      <button class="glass-btn" id="backToLogin" type="button" style="width:100%;">Back to login</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
