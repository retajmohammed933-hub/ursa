<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA - Admin Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark" data-page="adminsettings">
  <div class="overlay" id="overlay"></div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="close-btn" id="closeSidebar">&times;</div>
      <div class="brand-stack">
        <div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div>
        <div class="brand-copy"><div class="logo">URSA</div><p>Admin control center</p></div>
      </div>
      <div class="sidebar-group-label">Navigation</div>
      <ul>
        <li><a data-page="admin"><i class="fas fa-shield"></i><span>Admin Dashboard</span></a></li>
        <li><a data-page="adminsettings"><i class="fas fa-sliders"></i><span>Admin Settings</span></a></li>
      </ul>
      <div class="sidebar-card"><h3>Identity settings</h3><p>Maintain the admin account credentials used for control access.</p></div>
    </aside>
    <div class="page-shell">
      <header class="top-bar">
        <div class="logo-area">
          <button class="hamburger" id="openSidebar" type="button" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div class="topbar-copy"><h2>Admin Settings</h2><p>Update admin credentials</p></div>
        </div>
      </header>
      <main class="container">
        <section class="split-grid">
          <div class="glass-card">
            <div class="section-heading"><div><h2>Admin account details</h2><p>Save email, phone/ID for this admin profile.</p></div></div>
            <form id="adminSettingsForm">
              <label for="adminEmail">Admin Email</label>
              <input class="glass-input" id="adminEmail" type="email" required />
              <label for="adminPhone">Admin Phone</label>
              <input class="glass-input" id="adminPhone" type="text" required />
              <label for="adminNationalId">Admin National ID</label>
              <input class="glass-input" id="adminNationalId" type="text" required />
              <button type="submit" class="glass-btn primary"><i class="fas fa-floppy-disk"></i> Save settings</button>
            </form>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
