<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Admin Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body class="dark">
  <div class="container">
    <h1 style="font-size:3rem; margin-bottom: 30px;"><i class="fas fa-gear"></i> Admin Settings</h1>
    <div class="glass-card">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-shield-alt"></i> System Configuration</h2>
      <div class="glass-card" style="margin-bottom: 20px; background: rgba(255, 255, 255, 0.05);">
        <h3><i class="fas fa-lock"></i> Password Management</h3>
        <p style="color: var(--text-secondary); margin-bottom: 15px;">Admin password is currently hardcoded for security demonstrations.</p>
        <button class="glass-btn small" disabled>Change Password (PRO)</button>
      </div>
      <div class="glass-card" style="margin-bottom: 20px; background: rgba(255, 255, 255, 0.05);">
        <h3><i class="fas fa-database"></i> Data Management</h3>
        <p style="color: var(--text-secondary); margin-bottom: 15px;">Clear all system data (Users and Reports).</p>
        <button class="glass-btn" style="color: var(--danger); border-color: var(--danger);" onclick="if(confirm('Danger: This will delete EVERYTHING. Proceed?')){localStorage.clear(); location.reload();}">
          <i class="fas fa-trash-alt"></i> Wipe All Data
        </button>
      </div>
      <hr />
      <button class="glass-btn" style="width:100%; color: var(--danger); border-color: var(--danger);" onclick="adminLogout()">
        <i class="fas fa-sign-out-alt" style="margin-right: 10px;"></i> Log Out Admin Session
      </button>
    </div>
  </div>
  <script src="admin-script.js"></script>
</body>
</html>
