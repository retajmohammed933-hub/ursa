<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Manage Users</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid rgba(77, 255, 158, 0.2); color: var(--text-primary); }
    th { color: var(--primary); font-weight: 600; }
    .action-btn { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin: 0 4px; transition: 0.2s; }
    .action-btn:hover { transform: scale(1.05); }
    .delete-btn { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
    .delete-btn:hover { background: #ff6b6b; color: white; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
  </style>
</head>
<body class="dark">
  <div class="container">
    <h1 style="font-size:3rem; margin-bottom: 30px;"><i class="fas fa-users"></i> User Management</h1>
    <div class="glass-card">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-list"></i> Registered Citizens</h2>
      <div id="usersList">
        <div class="empty-state">Loading users...</div>
      </div>
    </div>
  </div>
  <script src="admin-script.js"></script>
</body>
</html>
