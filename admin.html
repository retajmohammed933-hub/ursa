<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - URSA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #05201f, #0a2a28);
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Login Card */
        .login-card {
            max-width: 450px;
            margin: 80px auto;
            background: rgba(8, 38, 36, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid rgba(77, 255, 158, 0.25);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card p {
            text-align: center;
            color: #b4d9d4;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #b4d9d4;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(77, 255, 158, 0.25);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4dbfa3;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d8f77, #1f6f5d);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid #ff6b6b;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.8rem;
        }

        .stats {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(8, 38, 36, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid rgba(77, 255, 158, 0.25);
            text-align: center;
        }

        .stat-box .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4dbfa3;
        }

        .stat-box .label {
            font-size: 0.8rem;
            color: #b4d9d4;
        }

        .logout-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
        }

        .logout-btn:hover {
            background: #ff6b6b;
        }

        .reports-table {
            background: rgba(8, 38, 36, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(77, 255, 158, 0.25);
            overflow-x: auto;
            padding: 20px;
        }

        .reports-table h3 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(77, 255, 158, 0.2);
        }

        th {
            color: #4dbfa3;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 170, 68, 0.2);
            color: #ffaa44;
        }

        .status-inprogress {
            background: rgba(77, 191, 163, 0.2);
            color: #4dbfa3;
        }

        .status-resolved {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .action-btn {
            padding: 6px 12px;
            margin: 0 4px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .delete-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #b4d9d4;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .stats {
                flex-wrap: wrap;
            }
            th, td {
                padding: 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Admin Login -->
        <div id="adminLogin">
            <div class="login-card">
                <h2><i class="fas fa-shield-alt"></i> Admin Access</h2>
                <p>Enter your password to access the dashboard</p>
                <div id="adminError" class="error-message"></div>
                <div class="input-group">
                    <label>Admin Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password">
                </div>
                <button class="btn" onclick="adminLogin()">Login</button>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="index.html" style="color: #b4d9d4; text-decoration: none;">← Back to Home</a>
                </div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="dashboard">
            <div class="header">
                <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
                <div class="stats">
                    <div class="stat-box">
                        <div class="number" id="totalReports">0</div>
                        <div class="label">Total Reports</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="pendingReports">0</div>
                        <div class="label">Pending</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="resolvedReports">0</div>
                        <div class="label">Resolved</div>
                    </div>
                    <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>

            <div class="reports-table">
                <h3><i class="fas fa-list"></i> All Submitted Reports</h3>
                <div id="reportsList">
                    <div class="empty-state">Loading reports...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Admin password - you can change this
        const ADMIN_PASSWORD = "admin123";

        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('adminError');

            if (password === ADMIN_PASSWORD) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminDashboard').classList.add('active');
                loadAllReports();
            } else {
                errorDiv.textContent = 'Invalid password';
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        }

        function adminLogout() {
            document.getElementById('adminLogin').style.display = 'block';
            document.getElementById('adminDashboard').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }

        function loadAllReports() {
            const reports = JSON.parse(localStorage.getItem('ursa_complaints') || '[]');
            const container = document.getElementById('reportsList');

            const total = reports.length;
            const pending = reports.filter(r => r.status === 'Pending').length;
            const resolved = reports.filter(r => r.status === 'Resolved').length;

            document.getElementById('totalReports').textContent = total;
            document.getElementById('pendingReports').textContent = pending;
            document.getElementById('resolvedReports').textContent = resolved;

            if (reports.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><br>No reports submitted yet</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            reports.reverse().forEach(report => {
                let statusClass = '';
                if (report.status === 'Pending') statusClass = 'status-pending';
                else if (report.status === 'In Progress') statusClass = 'status-inprogress';
                else statusClass = 'status-resolved';

                html += `
                    <tr>
                        <td>${report.id}</td>
                        <td>${report.description.substring(0, 60)}${report.description.length > 60 ? '...' : ''}</td>
                        <td>${report.category}</td>
                        <td>${report.location}</td>
                        <td>${report.date}</td>
                        <td><span class="status-badge ${statusClass}">${report.status}</span></td>
                        <td>
                            <button class="action-btn delete-btn" onclick="deleteReport(${report.id})"><i class="fas fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function deleteReport(id) {
            if (confirm('Are you sure you want to delete this report?')) {
                let reports = JSON.parse(localStorage.getItem('ursa_complaints') || '[]');
                reports = reports.filter(r => r.id !== id);
                localStorage.setItem('ursa_complaints', JSON.stringify(reports));
                loadAllReports();
                alert('Report deleted successfully');
            }
        }
    </script>
</body>
</html>
