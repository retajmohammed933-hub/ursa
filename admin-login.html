<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Admin Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #05201f, #0a2a28);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="dark login-page">
  <div class="container">
    <div id="page-login" class="page active-page">
      <div class="glass-card auth-card">
        <h1 style="text-align:center; margin-bottom:20px;"><i class="fas fa-shield-alt"></i> Admin Login</h1>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom:25px;">Enter admin credentials to access the system</p>
        <div class="error-message" id="adminError"></div>
        <form id="adminLoginForm" onsubmit="event.preventDefault(); adminLogin();">
          <label>Admin Password <span class="required-star">*</span></label>
          <input class="glass-input" type="password" id="adminPassword" placeholder="Enter admin password" required />
          <button type="submit" class="glass-btn primary" style="width:100%; margin-bottom:16px;">Login</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
          <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>
  <script src="admin-script.js"></script>
</body>
</html>
