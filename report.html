<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URSA - Unified Reporting & Safety</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-gradient: radial-gradient(circle at 10% 30%, #ffffff, #e8f0f5);
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-sidebar: rgba(255, 255, 255, 0.7);
            --text-primary: #1c2a2a;
            --text-secondary: #1e4f4f;
            --primary: #2fa4a4;
            --secondary: #4fd1c5;
            --accent: #66e0d9;
            --danger: #ff6b6b;
            --success: #2ba36a;
            --soft-shadow: 0 20px 40px -10px rgba(47, 164, 164, 0.2);
            --glass-edge: 1px solid rgba(47, 164, 164, 0.25);
        }

        body.dark {
            --bg-gradient: radial-gradient(circle at 80% 20%, #0f2f2f, #0a2323);
            --bg-card: rgba(22, 61, 61, 0.7);
            --bg-sidebar: rgba(15, 47, 47, 0.8);
            --text-primary: #eaf6f6;
            --text-secondary: #b4dddd;
            background: var(--bg-gradient);
            color: var(--text-primary);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
            border: var(--glass-edge);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            gap: 10px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: var(--glass-edge);
        }

        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Pages */
        .page {
            display: none;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: var(--glass-edge);
        }

        .page.active-page {
            display: block;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: var(--glass-edge);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        input:focus, textarea:focus, select:focus {
            outline: 2px solid var(--primary);
        }

        /* Buttons */
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-secondary {
            background: var(--text-secondary);
            color: white;
        }

        /* Report Cards */
        .report-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #ffc107;
            color: #333;
            font-size: 0.9rem;
        }

        .date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Messages */
        .success-message {
            background: var(--success);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            gap: 10px;
        }

        .theme-toggle i {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .theme-toggle i.active {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body class="dark">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <img src="URSA 3.png" alt="URSA Logo">
                <h1>URSA</h1>
            </div>
            <div class="theme-toggle">
                <i class="fas fa-sun" id="lightModeBtn"></i>
                <i class="fas fa-moon active" id="darkModeBtn"></i>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-bar">
            <button class="nav-btn active" onclick="showPage('report')">Report</button>
            <button class="nav-btn" onclick="showPage('myreports')">My Reports</button>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message">
            ✅ Complaint saved successfully!
        </div>

        <!-- Report Page -->
        <div id="page-report" class="page active-page">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Submit New Complaint</h2>
            
            <form id="reportForm">
                <div class="form-group">
                    <label>Description <span style="color: var(--primary);">*</span></label>
                    <textarea id="description" placeholder="Describe your complaint..." rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>Category <span style="color: var(--primary);">*</span></label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Accident">Accident</option>
                        <option value="Theft">Theft</option>
                        <option value="Road Damage">Road Damage</option>
                        <option value="Broken Light">Broken Light</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" value="Benha">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Complaint</button>
            </form>
        </div>

        <!-- My Reports Page -->
        <div id="page-myreports" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">My Complaints</h2>
                <div class="action-bar">
                    <button class="btn btn-success" onclick="newReport()">
                        <i class="fas fa-plus"></i> New Report
                    </button>
                    <button class="btn btn-secondary" onclick="refreshReports()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <div id="reportsContainer">
                <p style="text-align: center; color: var(--text-secondary);">No complaints yet</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="register.js"></script>
    <script src="reports.js"></script>
    <script src="script.js"></script>
</body>
</html>
