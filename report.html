<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA - Report</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark" data-page="report">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar"><div class="close-btn" id="closeSidebar">&times;</div><ul><li><a data-page="home">Home</a></li><li><a data-page="report">Report</a></li><li><a data-page="myreports">My Reports</a></li><li><a data-page="map">Map</a></li><li><a data-page="emergency">Emergency</a></li><li><a data-page="settings">Settings</a></li></ul></aside>
  <div class="top-bar"><div class="logo-area"><div class="hamburger" id="openSidebar"><i class="fas fa-bars"></i></div><div class="logo-container"><div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div><div class="logo">URSA</div></div></div><div class="theme-toggle"><i class="fas fa-sun" id="lightModeBtn"></i><i class="fas fa-moon active" id="darkModeBtn"></i></div></div>
  <div class="container">
    <div class="glass-card">
      <h2 style="margin-bottom:12px;">Report incident</h2>
      <form id="reportForm">
        <label>Description <span class="required-star">*</span></label>
        <textarea class="glass-textarea" id="reportDescription" required></textarea>
        <label>Location <span class="required-star">*</span></label>
        <input class="glass-input" id="reportLocation" required />
        <label>Category <span class="required-star">*</span></label>
        <div style="display:flex; flex-wrap:wrap; gap:10px; margin:8px 0 16px;">
          <button type="button" class="glass-btn category-btn" data-category="Accident">Accident</button>
          <button type="button" class="glass-btn category-btn" data-category="Theft">Theft</button>
          <button type="button" class="glass-btn category-btn" data-category="Road Damage">Road Damage</button>
          <button type="button" class="glass-btn category-btn" data-category="Broken Light">Broken Light</button>
        </div>
        <input type="hidden" id="selectedCategory" />
        <div class="glass-card" id="cameraBox" style="text-align:center; margin-bottom: 12px; cursor:pointer;">Tap to attach camera media</div>
        <div class="camera-preview" id="cameraPreview"></div>
        <button type="submit" class="glass-btn primary">Submit report</button>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
