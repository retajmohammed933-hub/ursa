<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Report Incident</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body class="dark">
  <div class="container">
    <div id="page-report" class="page active-page">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2><i class="fas fa-camera" style="color: var(--primary);"></i> Report incident</h2></div>
      <div class="glass-card">
        <div id="uploadInterface">
          <button type="button" id="uploadButton" class="glass-btn primary" style="width: 100%; margin-bottom: 20px;">
            <i class="fas fa-image"></i> Select Photo from Gallery
          </button>
          <input type="file" id="cameraFileInput" accept="image/*" style="display: none;">
          <div id="cameraPreview" class="camera-preview"></div>
          <button type="button" id="removePhotoBtn" class="glass-btn small" style="display: none; width: 100%; margin-top: 10px; margin-bottom: 20px;">
            <i class="fas fa-times"></i> Remove Photo
          </button>
        </div>
        
        <form id="reportForm">
          <label>Description <span class="required-star">*</span></label>
          <textarea class="glass-textarea" id="reportDescription" placeholder="Describe issue..." required></textarea>
          <label>Location <span class="required-star">*</span></label>
          <input class="glass-input" type="text" id="reportlocation" placeholder="Location..." required>
          <label>Category <span class="required-star">*</span></label>
          <div style="display:flex; flex-wrap:wrap; gap:12px; margin:16px 0;">
            <button type="button" class="glass-btn small category-btn" data-category="Accident">Accident</button>
            <button type="button" class="glass-btn small category-btn" data-category="Theft">Theft</button>
            <button type="button" class="glass-btn small category-btn" data-category="Road Damage">Road Damage</button>
            <button type="button" class="glass-btn small category-btn" data-category="Broken Light">Broken Light</button>
          </div>
          <input type="hidden" id="selectedCategory" required />
          <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button type="submit" class="glass-btn primary" style="flex: 2;"><i class="fas fa-paper-plane"></i> Submit report</button>
            <button type="button" class="glass-btn" onclick="window.location.href='myreports.html'" style="flex: 1;"><i class="fas fa-list"></i> View reports</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
