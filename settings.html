<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA - Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark" data-page="settings">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar"><div class="close-btn" id="closeSidebar">&times;</div><ul><li><a data-page="home">Home</a></li><li><a data-page="report">Report</a></li><li><a data-page="myreports">My Reports</a></li><li><a data-page="map">Map</a></li><li><a data-page="emergency">Emergency</a></li><li><a data-page="settings">Settings</a></li></ul></aside>
  <div class="top-bar"><div class="logo-area"><div class="hamburger" id="openSidebar"><i class="fas fa-bars"></i></div><div class="logo-container"><div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div><div class="logo">URSA</div></div></div><div class="theme-toggle"><i class="fas fa-sun" id="lightModeBtn"></i><i class="fas fa-moon active" id="darkModeBtn"></i></div></div>
  <div class="container">
    <div class="glass-card">
      <h2 style="margin-bottom:12px;">Profile</h2>
      <form id="settingsForm">
        <label>Full name <span class="required-star">*</span></label>
        <input class="glass-input" id="settingsFullName" required />
        <label>Phone <span class="required-star">*</span></label>
        <input class="glass-input" id="settingsPhone" maxlength="11" required />
        <label>Governorate <span class="required-star">*</span></label>
        <input class="glass-input" id="settingsGovernorate" required />
        <button type="submit" class="glass-btn primary">Update profile</button>
      </form>
      <div style="margin-top: 14px;"><button class="glass-btn" id="logoutBtn" type="button">Log Out</button></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
