<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Admin Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: rgba(255, 170, 68, 0.2); color: #ffaa44; }
    .status-inprogress { background: rgba(77, 191, 163, 0.2); color: #4dbfa3; }
    .status-resolved { background: rgba(72, 187, 120, 0.2); color: #48bb78; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid rgba(77, 255, 158, 0.2); color: var(--text-primary); }
    th { color: var(--primary); font-weight: 600; }
    
    .action-btn { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin: 0 4px; }
    .delete-btn { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
    .delete-btn:hover { background: #ff6b6b; color: white; }
    
    .status-select { background: var(--bg-card); border: var(--glass-edge); color: var(--text-primary); border-radius: 8px; padding: 4px; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
  </style>
</head>
<body class="dark">
  <div class="container">
    <h1 style="font-size:3rem; margin-bottom: 30px;">Admin Dashboard</h1>
    <div class="dash-grid">
      <div class="glass-card">
        <div style="font-size:3rem; color:var(--primary);" id="totalUsers">0</div>
        <h3>Total Users</h3>
        <p>Registered citizens</p>
      </div>
      <div class="glass-card">
        <div style="font-size:3rem; color:var(--secondary);" id="totalReports">0</div>
        <h3>Total Reports</h3>
        <p>All time reports</p>
      </div>
      <div class="glass-card">
        <div style="font-size:3rem; color:#ffaa44;" id="pendingReports">0</div>
        <h3>Pending</h3>
        <p>Awaiting review</p>
      </div>
      <div class="glass-card">
        <div style="font-size:3rem; color:#48bb78;" id="resolvedReports">0</div>
        <h3>Resolved</h3>
        <p>Completed reports</p>
      </div>
    </div>
    <div class="glass-card">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Quick Actions</h2>
      <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <button class="glass-btn primary" onclick="window.location.href='admin-users.html'"><i class="fas fa-users"></i> Manage Users</button>
        <button class="glass-btn primary" onclick="window.location.href='admin-reports.html'"><i class="fas fa-list"></i> Manage Reports</button>
        <button class="glass-btn" onclick="window.location.href='index.html'"><i class="fas fa-external-link-alt"></i> View Portal</button>
      </div>
    </div>
  </div>
  <script src="admin-script.js"></script>
</body>
</html>
