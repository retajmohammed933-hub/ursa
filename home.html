<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA - Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark" data-page="home">
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="close-btn" id="closeSidebar">&times;</div>
    <ul>
      <li><a data-page="home">Home</a></li><li><a data-page="report">Report</a></li><li><a data-page="myreports">My Reports</a></li>
      <li><a data-page="map">Map</a></li><li><a data-page="emergency">Emergency</a></li><li><a data-page="settings">Settings</a></li>
    </ul>
  </aside>
  <div class="top-bar"><div class="logo-area"><div class="hamburger" id="openSidebar"><i class="fas fa-bars"></i></div><div class="logo-container"><div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div><div class="logo">URSA</div></div></div><div class="theme-toggle"><i class="fas fa-sun" id="lightModeBtn"></i><i class="fas fa-moon active" id="darkModeBtn"></i></div></div>
  <div class="container">
    <h1>Dashboard</h1>
    <p id="homeGreeting" style="color: var(--text-secondary); margin-bottom: 16px;">Good evening</p>
    <div class="glass-card">
      <h2 id="homeUserName">User Name</h2>
      <p id="homeUserMeta">National ID</p>
      <div class="profile-row" style="margin-top:12px;">
        <div class="glass-card" id="homeGovernorate">Governorate</div>
        <div class="glass-card" id="homePhone">Phone</div>
      </div>
    </div>
    <div class="dash-grid">
      <div class="glass-card"><h3>Quick report</h3><button class="glass-btn primary" id="quickReport" type="button">Open camera</button></div>
      <div class="glass-card"><h3>Safety stats</h3><p>Your account is ready</p></div>
      <div class="glass-card"><h3>Account</h3><p>Logged in</p></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
